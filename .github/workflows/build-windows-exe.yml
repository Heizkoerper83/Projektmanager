name: Build Windows EXE

on:
  push:
    branches:
      - main
    paths:
      - "pr.py"
      - "pr.spec"
      - "pyproject.toml"
      - "requirements*.txt"
      - "pmtool/**"
      - "scripts/**"
      - ".github/workflows/build-windows-exe.yml"
  pull_request:
    paths:
      - "pr.py"
      - "pr.spec"
      - "pyproject.toml"
      - "requirements*.txt"
      - "pmtool/**"
      - "scripts/**"
      - ".github/workflows/build-windows-exe.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-exe:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller bcrypt

      - name: Build pr.exe
        shell: pwsh
        run: |
          python scripts/build_exe.py

      - name: Write build metadata
        shell: pwsh
        run: |
          $metadata = @{ commit = "${{ github.sha }}"; built_at = (Get-Date).ToUniversalTime().ToString("o") } | ConvertTo-Json
          Set-Content -Path build-metadata.json -Value $metadata -Encoding utf8

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-windows-exe
          path: |
            pr.exe
            pr.exe.sha256
            dist/pr.exe
            dist/pr.exe.sha256
            build-metadata.json

      - name: Move rolling release tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          git tag --force rolling-latest "${{ github.sha }}"
          git push --force origin rolling-latest

      - name: Publish rolling latest release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: rolling-latest
          name: Latest Windows Build
          prerelease: true
          make_latest: true
          files: |
            pr.exe
            pr.exe.sha256
            build-metadata.json
